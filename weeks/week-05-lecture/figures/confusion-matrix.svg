<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="Inter, -apple-system, sans-serif">
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2D2D2D">Confusion Matrix</text>

  <!-- Column headers -->
  <text x="300" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C">Actual Class</text>
  <text x="280" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#A71930">Elevated</text>
  <text x="440" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">Minimal</text>

  <!-- Row headers -->
  <text x="110" y="145" text-anchor="middle" font-size="13" font-weight="600" fill="#8C8C8C" transform="rotate(-90, 60, 200)">Predicted Class</text>
  <text x="135" y="158" text-anchor="end" font-size="13" font-weight="600" fill="#A71930">Elevated</text>
  <text x="135" y="278" text-anchor="end" font-size="13" font-weight="600" fill="#4A90D9">Minimal</text>

  <!-- TP cell (top-left) -->
  <rect x="155" y="98" width="160" height="110" rx="8" fill="#5BA55B" fill-opacity="0.15" stroke="#5BA55B" stroke-width="2"/>
  <text x="235" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#5BA55B">True Positive</text>
  <text x="235" y="165" text-anchor="middle" font-size="12" fill="#5BA55B">(TP)</text>
  <text x="235" y="188" text-anchor="middle" font-size="11" fill="#8C8C8C">Correctly identified</text>

  <!-- FP cell (top-right) -->
  <rect x="325" y="98" width="160" height="110" rx="8" fill="#E8873D" fill-opacity="0.15" stroke="#E8873D" stroke-width="2"/>
  <text x="405" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#E8873D">False Positive</text>
  <text x="405" y="165" text-anchor="middle" font-size="12" fill="#E8873D">(FP)</text>
  <text x="405" y="188" text-anchor="middle" font-size="11" fill="#8C8C8C">False alarm</text>

  <!-- FN cell (bottom-left) -->
  <rect x="155" y="218" width="160" height="110" rx="8" fill="#A71930" fill-opacity="0.15" stroke="#A71930" stroke-width="2"/>
  <text x="235" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#A71930">False Negative</text>
  <text x="235" y="285" text-anchor="middle" font-size="12" fill="#A71930">(FN)</text>
  <text x="235" y="308" text-anchor="middle" font-size="11" fill="#8C8C8C">Missed case</text>

  <!-- TN cell (bottom-right) -->
  <rect x="325" y="218" width="160" height="110" rx="8" fill="#4A90D9" fill-opacity="0.15" stroke="#4A90D9" stroke-width="2"/>
  <text x="405" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#4A90D9">True Negative</text>
  <text x="405" y="285" text-anchor="middle" font-size="12" fill="#4A90D9">(TN)</text>
  <text x="405" y="308" text-anchor="middle" font-size="11" fill="#8C8C8C">Correctly ruled out</text>

  <!-- Example context -->
  <text x="300" y="365" text-anchor="middle" font-size="12" fill="#8C8C8C" font-style="italic">Example: Depression screening — predicting elevated vs minimal symptoms</text>
  <text x="300" y="385" text-anchor="middle" font-size="11" fill="#A71930">False negatives = missed cases needing support</text>
  <text x="300" y="403" text-anchor="middle" font-size="11" fill="#E8873D">False positives = unnecessary follow-ups</text>
</svg>
