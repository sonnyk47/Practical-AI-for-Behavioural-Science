<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 410" font-family="Inter, -apple-system, sans-serif">
  <!-- Title -->
  <text x="375" y="25" text-anchor="middle" font-size="16" font-weight="700" fill="#2D2D2D">Cluster Stability: Are Your Groups Real or Noise?</text>
  <text x="375" y="45" text-anchor="middle" font-size="12" fill="#8C8C8C">Same data, same algorithm (k=3), different random seeds</text>

  <!-- Left panel: Seed 42 -->
  <rect x="25" y="60" width="310" height="250" rx="10" fill="#F8F8F8" stroke="#D0D0D0" stroke-width="1"/>
  <text x="180" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D2D">Run 1 (random_state = 42)</text>

  <!-- Cluster A (red) - top left -->
  <circle cx="70" cy="130" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="85" cy="120" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="95" cy="140" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="75" cy="145" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="100" cy="125" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="110" cy="135" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="60" cy="135" r="4" fill="#A71930" fill-opacity="0.5"/>

  <!-- Cluster B (blue) - right -->
  <circle cx="230" cy="130" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="245" cy="120" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="260" cy="140" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="250" cy="155" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="270" cy="130" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="240" cy="145" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="280" cy="145" r="4" fill="#4A90D9" fill-opacity="0.5"/>

  <!-- Cluster C (green) - bottom middle -->
  <circle cx="140" cy="230" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="155" cy="240" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="170" cy="225" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="160" cy="250" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="185" cy="235" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="145" cy="255" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="175" cy="245" r="4" fill="#5BA55B" fill-opacity="0.5"/>

  <!-- Boundary points that will flip -->
  <circle cx="140" cy="160" r="5" fill="#A71930" fill-opacity="0.5" stroke="#A71930" stroke-width="1.5"/>
  <circle cx="155" cy="170" r="5" fill="#5BA55B" fill-opacity="0.5" stroke="#5BA55B" stroke-width="1.5"/>
  <circle cx="195" cy="155" r="5" fill="#4A90D9" fill-opacity="0.5" stroke="#4A90D9" stroke-width="1.5"/>
  <circle cx="175" cy="175" r="5" fill="#5BA55B" fill-opacity="0.5" stroke="#5BA55B" stroke-width="1.5"/>

  <!-- Cluster boundaries (dashed) -->
  <ellipse cx="87" cy="133" rx="40" ry="25" fill="none" stroke="#A71930" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="255" cy="138" rx="40" ry="25" fill="none" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="162" cy="240" rx="35" ry="25" fill="none" stroke="#5BA55B" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="180" y="290" text-anchor="middle" font-size="10" fill="#2D2D2D">Silhouette: 0.23</text>

  <!-- Right panel: Seed 123 -->
  <rect x="415" y="60" width="310" height="250" rx="10" fill="#F8F8F8" stroke="#D0D0D0" stroke-width="1"/>
  <text x="570" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#2D2D2D">Run 2 (random_state = 123)</text>

  <!-- Same core points, but boundary points flipped -->
  <!-- Cluster A (red) - top left, bigger now -->
  <circle cx="460" cy="130" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="475" cy="120" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="485" cy="140" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="465" cy="145" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="490" cy="125" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="500" cy="135" r="4" fill="#A71930" fill-opacity="0.5"/>
  <circle cx="450" cy="135" r="4" fill="#A71930" fill-opacity="0.5"/>

  <!-- Cluster B (blue) - right, smaller -->
  <circle cx="620" cy="130" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="635" cy="120" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="650" cy="140" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="640" cy="155" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="660" cy="130" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="630" cy="145" r="4" fill="#4A90D9" fill-opacity="0.5"/>
  <circle cx="670" cy="145" r="4" fill="#4A90D9" fill-opacity="0.5"/>

  <!-- Cluster C (green) - bottom -->
  <circle cx="530" cy="230" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="545" cy="240" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="560" cy="225" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="550" cy="250" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="575" cy="235" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="535" cy="255" r="4" fill="#5BA55B" fill-opacity="0.5"/>
  <circle cx="565" cy="245" r="4" fill="#5BA55B" fill-opacity="0.5"/>

  <!-- Flipped boundary points (different clusters now!) -->
  <circle cx="530" cy="160" r="5" fill="#A71930" fill-opacity="0.5" stroke="#C8972C" stroke-width="2"/>
  <circle cx="545" cy="170" r="5" fill="#A71930" fill-opacity="0.5" stroke="#C8972C" stroke-width="2"/>
  <circle cx="585" cy="155" r="5" fill="#4A90D9" fill-opacity="0.5" stroke="#C8972C" stroke-width="2"/>
  <circle cx="565" cy="175" r="5" fill="#5BA55B" fill-opacity="0.5" stroke="#C8972C" stroke-width="2"/>

  <!-- Different cluster boundaries -->
  <ellipse cx="480" cy="135" rx="45" ry="28" fill="none" stroke="#A71930" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="645" cy="138" rx="38" ry="22" fill="none" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="550" cy="240" rx="35" ry="25" fill="none" stroke="#5BA55B" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="570" y="290" text-anchor="middle" font-size="10" fill="#2D2D2D">Silhouette: 0.21</text>

  <!-- Orange highlighted points label -->
  <circle cx="510" cy="290" r="5" fill="#C8972C" fill-opacity="0.3" stroke="#C8972C" stroke-width="2"/>
  <text x="612" y="294" text-anchor="middle" font-size="9" fill="#C8972C" font-weight="600">= changed cluster</text>

  <!-- Bottom verdict -->
  <rect x="75" y="325" width="600" height="70" rx="10" fill="#C8972C" fill-opacity="0.08" stroke="#C8972C" stroke-width="1.5"/>
  <text x="375" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#C8972C">Core clusters are stable, but boundary points flip between runs</text>
  <text x="375" y="368" text-anchor="middle" font-size="11" fill="#8C8C8C">If many points change cluster with a different seed, the solution isn't trustworthy.</text>
  <text x="375" y="385" text-anchor="middle" font-size="11" fill="#8C8C8C">Always report stability checks &#x2014; a discovery that doesn't replicate isn't a discovery.</text>
</svg>